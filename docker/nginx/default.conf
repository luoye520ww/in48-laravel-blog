server {
    listen 80 backlog=8192;
    server_name _;
    root /var/www/html/in48-laravel-blog/public;
    index index.php index.html;

    client_max_body_size 100m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/in48-laravel-blog/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/in48-laravel-blog/public;
        fastcgi_read_timeout 60s;
        fastcgi_buffering on;
        fastcgi_buffers 32 32k;
        fastcgi_buffer_size 64k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
